<!DOCTYPE html>
<html>
<head>
  <title>Worksheet Generator</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      margin: 0;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    h2 {
      color: #1F4E79;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #1F4E79;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .question {
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid #eee;
    }

    .solution {
      color: green;
      margin-top: 5px;
      white-space: pre-wrap;
    }

    .error {
      color: red;
      text-align: center;
    }

    label {
      font-size: 12px;
      font-weight: bold;
      display: block;
      margin-top: 10px;
    }

    select {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="card">
  <h2>Generate Worksheet</h2>

  <label>Number of Questions</label>
  <input type="number" id="qcount" value="5" min="3" max="10">

  <label>Worksheet Title</label>
  <input type="text" id="wtitle" placeholder="Worksheet Title">

  <label>Subject</label>
  <select id="subject">
    <option>Mathematics</option>
    <option>Physics</option>
    <option>Chemistry</option>
    <option>Computer Science</option>
    <option>Data Structures</option>
  </select>

  <label>Topic / Chapter</label>
  <input type="text" id="topic" placeholder="e.g. Recursion, Graphs, Integration">

  <label>Difficulty Level</label>
  <select id="level">
    <option>Easy</option>
    <option selected>Medium</option>
    <option>Hard</option>
  </select>

  <br><br>
  <button onclick="generate()">Generate</button>
</div>

  <div class="card" id="output" style="display:none"></div>

</div>

<script>
async function generate() {

  const n = Math.min(10, Math.max(3, parseInt(document.getElementById('qcount').value) || 5));
  const title = document.getElementById('wtitle').value.trim() || "Worksheet";
  const out = document.getElementById('output');

  out.style.display = 'block';
  out.innerHTML = "Generating...";

  const subject = document.getElementById('subject').value;
  const topic = document.getElementById('topic').value || "general concepts";
  const level = document.getElementById('level').value;

  const prompt = `
  Generate ${n} ${level}-level questions for ${subject} on topic: ${topic}.

  Return ONLY valid JSON:
  {"questions":[{"subject":"${subject}","question":"...","solution":"..."}]}

  Rules:
  - Engineering level
  - Step-by-step solution
  - Final answer clearly mentioned
  `;

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt })
    });

    const raw = await res.text();
    let data = JSON.parse(raw);

    let text = data.choices?.[0]?.message?.content;

    if (!text) throw new Error("Invalid API response");

    text = text.replace(/```json/g,'').replace(/```/g,'').trim();

    const start = text.indexOf('{');
    const end = text.lastIndexOf('}');
    const jsonString = text.substring(start, end + 1);

    const parsed = JSON.parse(jsonString);
    const qs = parsed.questions;

    let html = `<h2>${title}</h2>`;

    qs.forEach((q, i) => {
      html += `
        <div class="question">
          <b>Q${i+1} (${q.subject})</b><br>
          ${q.question}
          <div class="solution">${q.solution}</div>
        </div>
      `;
    });

    out.innerHTML = html;

  } catch (e) {
    out.innerHTML = `<div class="error">${e.message}</div>`;
  }
}
</script>

</body>
</html>
