<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevOps Worksheet Generator</title>

  <style>
    body { font-family: Arial; background:#f4f6f9; margin:0; }
    .container { max-width:800px; margin:40px auto; }

    .card {
      background:white;
      padding:20px;
      border-radius:10px;
      margin-bottom:20px;
      box-shadow:0 2px 6px rgba(0,0,0,0.1);
    }

    .gen-btn {
      width:100%;
      padding:12px;
      background:#1F4E79;
      color:white;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }

    .error { color:red; text-align:center; }
  </style>
</head>

<body>

<div class="container">

  <div class="card">
    <h2>Generate Worksheet</h2>

    <input type="number" id="qcount" value="5" min="3" max="10"><br><br>
    <input type="text" id="wtitle" placeholder="Worksheet Title"><br><br>

    <button class="gen-btn" onclick="generate()">Generate</button>
  </div>

  <div class="card" id="output" style="display:none"></div>

</div>

<script>

async function generate() {

  const n = Math.min(10, Math.max(3, parseInt(document.getElementById('qcount').value) || 5));
  const title = document.getElementById('wtitle').value.trim() || "Worksheet";
  const out = document.getElementById('output');

  out.style.display = 'block';

  out.innerHTML = "Generating...";

  const prompt = `Generate ${n} engineering-level questions with solutions in JSON format:
{"questions":[{"subject":"Math","question":"...","solution":"..."}]}`;

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt })
    });

    const raw = await res.text();
    console.log("RAW:", raw);

    let data;
    try {
      data = JSON.parse(raw);
    } catch {
      throw new Error(raw);
    }

    let text = data.choices?.[0]?.message?.content;

    if (!text) throw new Error("Invalid API response");

    // Clean response
    text = text.replace(/```json/g,'').replace(/```/g,'').trim();

    const start = text.indexOf('{');
    const end = text.lastIndexOf('}');
    const jsonString = text.substring(start, end + 1);

    const parsed = JSON.parse(jsonString);
    const qs = parsed.questions;

    let html = `<h3>${title}</h3>`;

    qs.forEach((q, i) => {
      html += `
        <div style="margin-bottom:15px">
          <b>Q${i+1} (${q.subject})</b><br>
          ${q.question}<br><br>
          <i>${q.solution}</i>
        </div>
      `;
    });

    out.innerHTML = html;

  } catch (e) {
    out.innerHTML = `<div class="error">${e.message}</div>`;
  }
}
</script>

</body>
</html>
